name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_WORDPRESS_URL: https://ci-placeholder.invalid
  WORDPRESS_API_URL: https://ci-placeholder.invalid/wp-json/wp/v2
  WC_API_URL: https://ci-placeholder.invalid/wp-json/wc/v3
  WC_CONSUMER_KEY: ck_ci_placeholder
  WC_CONSUMER_SECRET: cs_ci_placeholder
  WP_APP_USER: ci
  WP_APP_PASSWORD: ci
  REVALIDATE_SECRET: ci-secret
  STRIPE_SECRET_KEY: sk_test_ci_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: paypal-client-id
  PAYPAL_SECRET: paypal-secret
  PAYPAL_MODE: sandbox
  PAYPAL_WEBHOOK_ID: paypal-webhook-id
  FREE_SHIPPING_THRESHOLD: "50"
  DHL_PRICE_KLEINPAKET: "3.99"
  DHL_PRICE_PAKET: "5.49"
  DHL_PRICE_INTERNATIONAL: "8.99"

jobs:
  frontend:
    name: Frontend - Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Run frontend unit and API tests
        run: pnpm test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Production build
        run: pnpm build

  backend-phpunit:
    name: Backend - PHPUnit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, json, xml, dom
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run plugin PHPUnit suite
        run: php vendor/bin/phpunit --colors=always

  backend-wordpress:
    name: Backend - WordPress integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: kubikart_test
      DB_USER: kubikart
      DB_PASSWORD: kubikart_pass
      WP_PATH: /tmp/wp-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kubikart_test
          MYSQL_USER: kubikart
          MYSQL_PASSWORD: kubikart_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3 and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, json, xml, dom, mysqli, pdo_mysql
          tools: wp-cli

      - name: Wait for MySQL
        run: |
          for attempt in {1..30}; do
            if php -r '$db = @new mysqli(getenv("DB_HOST"), getenv("DB_USER"), getenv("DB_PASSWORD"), getenv("DB_NAME"), (int) getenv("DB_PORT")); exit($db->connect_errno ? 1 : 0);'; then
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Prepare WordPress test install
        run: |
          rm -rf "${WP_PATH}"
          mkdir -p "${WP_PATH}"
          cp -a backend/wordpress/. "${WP_PATH}/"
          rm -f "${WP_PATH}/wp-config.php"

      - name: Configure WordPress
        run: |
          wp config create \
            --path="${WP_PATH}" \
            --dbname="${DB_NAME}" \
            --dbuser="${DB_USER}" \
            --dbpass="${DB_PASSWORD}" \
            --dbhost="${DB_HOST}:${DB_PORT}" \
            --skip-check \
            --allow-root

      - name: Install WordPress
        run: |
          wp core install \
            --path="${WP_PATH}" \
            --url="http://localhost" \
            --title="Kubikart CI" \
            --admin_user="admin" \
            --admin_password="admin_pass_ci" \
            --admin_email="ci@kubikart.de" \
            --skip-email \
            --allow-root

      - name: Activate Kubikart plugins
        run: |
          wp plugin activate woocommerce kubikart-security kubikart-newsletter \
            --path="${WP_PATH}" \
            --allow-root

      - name: Verify WordPress, WooCommerce hooks, and custom plugins
        run: |
          wp db check --path="${WP_PATH}" --allow-root
          wp plugin is-active woocommerce --path="${WP_PATH}" --allow-root
          wp plugin is-active kubikart-security --path="${WP_PATH}" --allow-root
          wp plugin is-active kubikart-newsletter --path="${WP_PATH}" --allow-root

          wp eval '
            do_action("rest_api_init");
            $routes = array_keys(rest_get_server()->get_routes());
            foreach (["/kubikart/v1/forgot-password", "/kubikart/v1/reset-password"] as $route) {
              if (!in_array($route, $routes, true)) {
                fwrite(STDERR, "Missing REST route: {$route}\n");
                exit(1);
              }
            }

            if (!post_type_exists("newsletter_sub")) {
              fwrite(STDERR, "Newsletter post type was not registered\n");
              exit(1);
            }

            if (!function_exists("kubikart_dhl_meta_box_content")) {
              fwrite(STDERR, "DHL shipping mu-plugin did not load\n");
              exit(1);
            }

            if (!function_exists("kubikart_recalculate_product_rating")) {
              fwrite(STDERR, "Rating sync mu-plugin did not load\n");
              exit(1);
            }

            if (!function_exists("kubikart_render_custom_fields_metabox")) {
              fwrite(STDERR, "Custom product fields mu-plugin did not load\n");
              exit(1);
            }

            foreach (["WC_Gateway_Kubikart_Stripe", "WC_Gateway_Kubikart_PayPal"] as $gateway) {
              if (!class_exists($gateway)) {
                fwrite(STDERR, "Missing payment gateway class: {$gateway}\n");
                exit(1);
              }
            }

            echo "WordPress integration checks passed.\n";
          ' --path="${WP_PATH}" --allow-root

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - frontend
      - backend-phpunit
      - backend-wordpress

    steps:
      - name: Ensure all required jobs passed
        run: |
          failed=0

          [[ "${{ needs.frontend.result }}" == "success" ]] || { echo "Frontend job failed"; failed=1; }
          [[ "${{ needs.backend-phpunit.result }}" == "success" ]] || { echo "Backend PHPUnit job failed"; failed=1; }
          [[ "${{ needs.backend-wordpress.result }}" == "success" ]] || { echo "Backend WordPress integration job failed"; failed=1; }

          exit "${failed}"
